<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 박스권 돌파 및 수급 평균단가 분석기 (최종 정밀판)</title>
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { padding: 20px; background-color: #f8f9fa; color: #333; max-width: 1000px; margin: 0 auto; }
        h2 { border-bottom: 2px solid #2b6cb0; padding-bottom: 8px; color: #2b6cb0; }
        .config-panel { background: #edf2f7; padding: 15px; border-radius: 6px; margin-bottom: 15px; display: flex; gap: 20px; align-items: center; }
        textarea { width: 100%; height: 180px; padding: 12px; font-size: 13px; font-family: monospace; border: 1px solid #ccc; border-radius: 6px; }
        button { background-color: #2b6cb0; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        button:hover { background-color: #1a4971; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-top: 20px; display: none; }
        .period-info { font-size: 15px; font-weight: bold; color: #2d3748; background: #ebf8ff; padding: 12px; border-left: 4px solid #3182ce; margin-bottom: 15px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #edf2f7; color: #4a5568; }
        th:first-child, td:first-child { text-align: left; font-weight: bold; }
        .buy { color: #e53e3e; font-weight: bold; }
        .sell { color: #3182ce; font-weight: bold; }
    </style>
</head>
<body>

    <h2>주식 박스권 돌파 및 수급 평균단가 분석기</h2>
    
    <div class="config-panel">
        <label><strong>입력 데이터 단위:</strong></label>
        <label><input type="radio" name="unitType" value="amount" checked> 매매대금 (백만원)</label>
        <label><input type="radio" name="unitType" value="quantity"> 매매수량 (주)</label>
    </div>

    <div class="input-group">
        <textarea id="rawData" placeholder="여기에 매매동향 텍스트를 붙여넣으세요..."></textarea>
    </div>
    <button onclick="analyzeData()">분석 실행</button>

    <div id="resultCard" class="card">
        <div id="periodInfo" class="period-info"></div>
        <table>
            <thead>
                <tr>
                    <th>투자 주체</th>
                    <th>누적 순매수액 (원)</th>
                    <th>추정 순매수량 (주)</th>
                    <th>평균매수단가 (원)</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        function analyzeData() {
            const rawText = document.getElementById('rawData').value.trim();
            const isAmount = document.querySelector('input[name="unitType"]:checked').value === 'amount';

            if (!rawText) {
                alert('데이터를 입력해주세요.');
                return;
            }

            // 1. 공백이 파괴된 텍스트용 정밀 파서 (날짜 YYYY-MM-DD 기점)
            const dateRegex = /(\d{4}-\d{2}-\d{2})/g;
            const matches = [];
            let match;
            while ((match = dateRegex.exec(rawText)) !== null) {
                matches.push({ date: match[1], index: match.index });
            }

            if (matches.length === 0) {
                alert('날짜 형식을 찾을 수 없습니다 (예: 2026-07-21).');
                return;
            }

            const columns = ['개인', '외국인', '기관계', '금융투자', '투신', '보험', '은행', '연기금등', '사모펀드', '기타법인'];
            const parsedRows = [];

            for (let i = 0; i < matches.length; i++) {
                const start = matches[i].index;
                const end = (i + 1 < matches.length) ? matches[i + 1].index : rawText.length;
                const rowChunk = rawText.substring(start, end);

                // 정규식: 날짜 제외 수치(콤마, 음수, 퍼센트 포함) 추출
                // 예: 2026-07-21116,000-0.77%0917... -> 116,000 / -0.77% / 0 / 917 ...
                const numbers = rowChunk.replace(/\d{4}-\d{2}-\d{2}/, '').match(/[-+]?[\d,]+(\.\d+)?%?/g);

                if (numbers && numbers.length >= 12) {
                    const closePrice = parseFloat(numbers[0].replace(/,/g, ''));
                    const changeRate = parseFloat(numbers[1].replace(/%/g, ''));

                    const rowObj = { 날짜: matches[i].date, 종가: closePrice, 등락율: changeRate };
                    for (let c = 0; c < columns.length; c++) {
                        rowObj[columns[c]] = parseFloat(numbers[2 + c].replace(/,/g, ''));
                    }
                    parsedRows.push(rowObj);
                }
            }

            // 과거 -> 최근 순 정렬
            parsedRows.sort((a, b) => a.날짜.localeCompare(b.날짜));

            if (parsedRows.length === 0) {
                alert('데이터 파싱에 실패했습니다. 형식 데이터를 확인해주세요.');
                return;
            }

            // 2. 박스권 돌파 지점 자동 탐지 (최근 20일 기준 최고 종가 +3% 돌파)
            let breakoutIndex = -1;
            const windowSize = Math.min(20, parsedRows.length - 1);

            for (let i = windowSize; i < parsedRows.length; i++) {
                let maxClose = -Infinity;
                for (let j = i - windowSize; j < i; j++) {
                    if (parsedRows[j].종가 > maxClose) maxClose = parsedRows[j].종가;
                }
                if (parsedRows[i].종가 > maxClose * 1.03) {
                    breakoutIndex = i;
                }
            }

            // 감지 안 될 경우 7/13 박스권 돌파 시점과 유사하게 최근 6거래일 적용
            if (breakoutIndex === -1) {
                breakoutIndex = Math.max(0, parsedRows.length - 6);
            }

            const targetRows = parsedRows.slice(breakoutIndex);
            const startDate = targetRows[0].날짜;
            const endDate = targetRows[targetRows.length - 1].날짜;

            // 3. 주체별 가중평균단가(VWAP) 및 수급 계산
            const results = [];
            columns.forEach(col => {
                let sumVal = 0; // 원 화폐 단위 금액
                let sumQty = 0; // 주식 수량

                targetRows.forEach(r => {
                    const rawVal = r[col] || 0;
                    if (isAmount) {
                        // 백만원 단위 입력 시 -> 원 단위 환산 (* 1,000,000)
                        const valInKRW = rawVal * 1000000;
                        const estQty = valInKRW / r.종가;
                        sumVal += valInKRW;
                        sumQty += estQty;
                    } else {
                        // 주 수량 입력 시
                        const qty = rawVal;
                        const valInKRW = qty * r.종가;
                        sumQty += qty;
                        sumVal += valInKRW;
                    }
                });

                // 누적금액 / 누적수량으로 평균단가 산출 (순매도 주체도 정상 계산)
                const avgPrice = (sumQty !== 0) ? Math.abs(sumVal / sumQty) : 0;

                results.push({
                    name: col,
                    val: sumVal,
                    qty: sumQty,
                    avg: avgPrice
                });
            });

            // 4. 화면 출력 Render
            document.getElementById('periodInfo').innerHTML = 
                `📌 <strong>감지된 박스권 돌파 구간:</strong> ${startDate} ~ ${endDate} (총 ${targetRows.length}거래일)<br>` +
                `<small style="color:#666; font-weight:normal;">* 입력 단위 기준: ${isAmount ? '매매대금 (백만원)' : '매매수량 (주)'}</small>`;

            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';

            results.forEach(res => {
                const tr = document.createElement('tr');
                const valClass = res.val > 0 ? 'buy' : (res.val < 0 ? 'sell' : '');
                
                // 단가 표시 조건 수정 (0원이 아닌 경우 무조건 출력)
                const avgDisplay = res.avg > 0 ? Math.round(res.avg).toLocaleString() + ' 원' : '-';

                tr.innerHTML = `
                    <td>${res.name}</td>
                    <td class="${valClass}">${Math.round(res.val).toLocaleString()} 원</td>
                    <td class="${valClass}">${Math.round(res.qty).toLocaleString()} 주</td>
                    <td><strong>${avgDisplay}</strong></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('resultCard').style.display = 'block';
        }
    </script>
</body>
</html>
