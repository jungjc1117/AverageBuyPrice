        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        vertical-align: middle;
      }

      }
      .status {

        color: #7f8c8d;
        font-size: 14px;
      }
      .instruction-text {
        margin-top: 10px;
        padding: 10px;
        background-color: #eef7fc;
        border-left: 4px solid #3498db;
        color: #2c3e50;
        font-size: 13.5px;
        font-weight: bold;
        border-radius: 0 4px 4px 0;
      }
      /* 테이블 스타일링 */
      .table-container {
        margin-top: 20px;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        padding: 10px 8px;
        border: 1px solid #ddd;
        text-align: right;
        white-space: nowrap;
      }
      th {
        background-color: #f1f2f6;
        color: #333;
        text-align: center;
      }
      td:first-child {
        text-align: center;
      }
      .text-red {
        color: #e74c3c;
        font-weight: bold;
      }
      .text-blue {
        color: #3498db;
        font-weight: bold;
      }

          // 💡 [핵심 조치] URL에 stkNm 값이 존재하면 화면이 뜨자마자 조회 버튼을 강제로 클릭시킵니다.
          setTimeout(() => {
            document.getElementById("btnFetch").click();
          }, 100); // 0.1초 미세 딜레이를 주어 안정적으로 엘리먼트 맵핑 후 실행되도록 유도
        }
      });

      // 1. 토큰 발급 함수
      async function fetchToken() {
        if (cachedToken) return cachedToken;
        const url = "https://mockapi.kiwoom.com/oauth2/token";
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json;charset=UTF-8" },
          body: JSON.stringify(accessParams),
        });
        if (!res.ok) throw new Error(`토큰 발급 에러: ${res.status}`);
        const data = await res.json();
        cachedToken = data.token || data.access_token;
        return cachedToken;
      }

      // 2. 종목별투자자기관별요청
      async function fn_ka10059(token, shcode, formattedDate) {
        const host = "https://mockapi.kiwoom.com";
        const endpoint = "/api/dostk/stkinfo";
        const url = host + endpoint;

        const headers = {
          "Content-Type": "application/json;charset=UTF-8",
          authorization: `Bearer ${token}`,
          "cont-yn": "N",
          "next-key": "",
          "api-id": "ka10059",
        };

        const requestData = {
          id: "ka10059",
          dt: String(formattedDate),
          stk_cd: String(shcode),
          amt_qty_tp: "1",
          trde_tp: "0",
          unit_tp: "1",
        };

        const response = await fetch(url, {
          method: "POST",
          headers: headers,
          body: JSON.stringify(requestData),
        });

        if (!response.ok)
          throw new Error(`API 응답 실패 (Code: ${response.status})`);

        const bodyData = await response.json();
        return bodyData;
      }

      // 3. 데이터를 가져와 테이블 화면을 만들어주는 함수
      function displayTable(apiResult) {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        const dataList =
          apiResult.stk_invsr_orgn || apiResult.output || apiResult.grid || [];

        if (!dataList || dataList.length === 0) {
          tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;">조회된 데이터가 없습니다.</td></tr>`;
          document.getElementById("resultTable").style.display = "table";
          return;
        }

        dataList.forEach((item) => {
          const tr = document.createElement("tr");

          const getColorClass = (val) => {
            if (!val) return "";
            const num = Number(val);
            if (num > 0) return "text-red";
            if (num < 0) return "text-blue";
            return "";
          };

          const getSigColorClass = (sig) => {
            const sigStr = String(sig);
            if (sigStr === "1" || sigStr === "2") return "text-red";
            if (sigStr === "4" || sigStr === "5") return "text-blue";
            return "";
          };

          const formatNum = (val) => {
            if (val === undefined || val === null || val === "") return "-";
            return Number(val).toLocaleString();
          };

          const formatDate = (dateStr) => {
            const str = String(dateStr);
            if (str && str.length === 8) {
              return `${str.substring(0, 4)}-${str.substring(4, 6)}-${str.substring(6, 8)}`;
            }
            return str || "-";
          };

          const formatFluRt = (val) => {
            if (val === undefined || val === null || val === "") return "-";
            return (Number(val) / 100).toFixed(2);
          };

          tr.innerHTML = `
                <td>${formatDate(item.dt)}</td>
                <td>${Math.abs(item.cur_prc)}</td>
                <!--<td class="${getSigColorClass(item.pre_sig)}">${formatNum(item.pred_pre)}</td>-->
                <td class="${getSigColorClass(item.pre_sig)}">${formatFluRt(item.flu_rt)}%</td>
                <td class="${getColorClass(item.ind_invsr)}">${formatNum(item.ind_invsr)}</td>
                <td class="${getColorClass(item.frgnr_invsr)}">${formatNum(item.frgnr_invsr)}</td>
                <td class="${getColorClass(item.orgn)}">${formatNum(item.orgn)}</td>
                <td class="${getColorClass(item.fnnc_invt)}">${formatNum(item.fnnc_invt)}</td>
                <td class="${getColorClass(item.invtrt)}">${formatNum(item.invtrt)}</td>
                <td class="${getColorClass(item.insrnc)}">${formatNum(item.insrnc)}</td>
                <td class="${getColorClass(item.bank)}">${formatNum(item.bank)}</td>
                <td class="${getColorClass(item.penfnd_etc)}">${formatNum(item.penfnd_etc)}</td>
                <td class="${getColorClass(item.samo_fund)}">${formatNum(item.samo_fund)}</td>
                <td class="${getColorClass(item.etc_corp)}">${formatNum(item.etc_corp)}</td>
            `;
          tbody.appendChild(tr);
        });

        document.getElementById("resultTable").style.display = "table";
      }

      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      // 4. 버튼 클릭 이벤트 연동
      document
        .getElementById("btnFetch")
        .addEventListener("click", async () => {
          const statusText = document.getElementById("statusText");
          const inputStkNm = document.getElementById("stkNm").value.trim();
          const formattedDate = document.getElementById("reqDate").value.trim();

          if (!inputStkNm) {
            alert("종목명을 입력하세요.");
            return;
          }
          if (!formattedDate || formattedDate.length !== 8) {
            alert("조회할 날짜 8자리를 입력하세요. (예: 20260710)");
            return;
          }

          const foundStock = stockList.find(
            (stock) => stock.stk_nm === inputStkNm,
          );

          if (!foundStock) {
            alert(`'${inputStkNm}'에 해당하는 종목 데이터를 찾을 수 없습니다.`);
            return;
          }

          const shcode = foundStock.stk_cd;

          try {
            statusText.innerText = `'${inputStkNm}' (${shcode}) 조회 준비 중...`;
            const token = await fetchToken();

            statusText.innerText =
              "인증 성공! 안전한 조회를 위해 1초간 대기 중...";
            await delay(1000);

            statusText.innerText = `'${inputStkNm}' API 데이터 요청 중...`;
            const result = await fn_ka10059(token, shcode, formattedDate);

            statusText.innerText = "성공적으로 데이터를 가져왔습니다.";
            displayTable(result);
          } catch (error) {
            statusText.innerText = `오류 발생: ${error.message}`;
            console.error(error);
          }
        });
    </script>
  </body>
